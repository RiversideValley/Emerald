name: CI Build & Artifacts

on:
  push:
    branches: [main, release/**]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, release/**]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-filter:
    name: Resolve CI Platform Filter
    runs-on: ubuntu-latest
    outputs:
      run_windows: ${{ steps.filter.outputs.run_windows }}
      run_macos: ${{ steps.filter.outputs.run_macos }}
      run_linux: ${{ steps.filter.outputs.run_linux }}

    steps:
      - name: Resolve commit/PR tags
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"

          if [ "$event_name" = "pull_request" ]; then
            source_text="$(jq -r '.pull_request.title // "", .pull_request.body // ""' "$GITHUB_EVENT_PATH")"
          else
            source_text="$(jq -r '.head_commit.message // ""' "$GITHUB_EVENT_PATH")"
          fi

          source_text_lc="$(printf '%s' "$source_text" | tr '[:upper:]' '[:lower:]')"

          run_windows=true
          run_macos=true
          run_linux=true

          has_ci_windows=false
          has_ci_macos=false
          has_ci_linux=false

          if [[ "$source_text_lc" == *"[ci-windows]"* ]]; then
            has_ci_windows=true
          fi
          if [[ "$source_text_lc" == *"[ci-macos]"* ]]; then
            has_ci_macos=true
          fi
          if [[ "$source_text_lc" == *"[ci-linux]"* ]]; then
            has_ci_linux=true
          fi

          if [[ "$source_text_lc" == *"[no-ci]"* ]]; then
            run_windows=false
            run_macos=false
            run_linux=false
          elif $has_ci_windows || $has_ci_macos || $has_ci_linux; then
            run_windows=$has_ci_windows
            run_macos=$has_ci_macos
            run_linux=$has_ci_linux
          fi

          echo "Resolved flags: windows=$run_windows macos=$run_macos linux=$run_linux"
          {
            echo "run_windows=$run_windows"
            echo "run_macos=$run_macos"
            echo "run_linux=$run_linux"
          } >> "$GITHUB_OUTPUT"

  publish-windows:
    name: Windows Unsigned Bundle (x64 + arm64)
    needs: ci-filter
    if: ${{ needs.ci-filter.outputs.run_windows == 'true' }}
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        uses: ./.github/steps/install_dependencies
        with:
          job-platform: windows

      - name: Restore project
        shell: pwsh
        run: |
          dotnet msbuild .\Emerald\Emerald.csproj `
            /r /t:Restore `
            /p:Configuration=Release `
            /p:PublishReadyToRun=false `
            /nologo /v:minimal

      - name: Publish unsigned MSIX packages (x64 + arm64)
        shell: pwsh
        run: |
          $packagesRoot = Join-Path $env:GITHUB_WORKSPACE "artifacts\windows\packages"
          New-Item -ItemType Directory -Path $packagesRoot -Force | Out-Null

          $platforms = @("x64", "arm64")
          foreach ($platform in $platforms) {
            $appxDir = Join-Path $packagesRoot "$platform\"
            New-Item -ItemType Directory -Path $appxDir -Force | Out-Null

            dotnet msbuild .\Emerald\Emerald.csproj `
              /p:TargetFramework=net10.0-windows10.0.26100 `
              /p:Configuration=Release `
              /p:Platform=$platform `
              /p:PublishReadyToRun=false `
              /p:PublishUnsignedPackage=true `
              /p:AppxPackageDir="$appxDir" `
              /nologo /v:minimal
          }

      - name: Bundle MSIX packages
        shell: pwsh
        run: |
          $packagesRoot = Join-Path $env:GITHUB_WORKSPACE "artifacts\windows\packages"
          $bundleInput = Join-Path $env:GITHUB_WORKSPACE "artifacts\windows\bundle-input"
          $bundleOutput = Join-Path $env:GITHUB_WORKSPACE "artifacts\windows\final"
          New-Item -ItemType Directory -Path $bundleInput -Force | Out-Null
          New-Item -ItemType Directory -Path $bundleOutput -Force | Out-Null

          $platforms = @("x64", "arm64")
          $msixFiles = @()
          foreach ($platform in $platforms) {
            $platformDir = Join-Path $packagesRoot $platform
            $package = Get-ChildItem $platformDir -Recurse -Filter *.msix -File `
              | Where-Object { $_.Name -match "_$platform\\.msix$" } `
              | Sort-Object LastWriteTime -Descending `
              | Select-Object -First 1

            if (-not $package) {
              $package = Get-ChildItem $platformDir -Recurse -Filter *.msix -File `
              | Sort-Object LastWriteTime -Descending `
              | Select-Object -First 1
            }

            if (-not $package) {
              throw "No .msix package found for $platform in $platformDir."
            }

            $msixFiles += $package
          }

          $msixFiles | ForEach-Object {
            Copy-Item $_.FullName -Destination (Join-Path $bundleInput $_.Name) -Force
          }

          $makeAppx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" `
            | Sort-Object FullName -Descending `
            | Select-Object -First 1 -ExpandProperty FullName

          if (-not $makeAppx) {
            throw "makeappx.exe not found on runner."
          }

          $bundlePath = Join-Path $bundleOutput "Emerald-Windows-Unsigned-x64-arm64.msixbundle"
          & $makeAppx bundle /o /d $bundleInput /p $bundlePath

          $zipPath = Join-Path $env:GITHUB_WORKSPACE "Emerald-Windows-Unsigned-x64-arm64.zip"
          Compress-Archive -Path $bundlePath -DestinationPath $zipPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Emerald-Windows-Unsigned-x64-arm64
          path: ${{ github.workspace }}/Emerald-Windows-Unsigned-x64-arm64.zip
          retention-days: 7

  publish-macos:
    name: macOS .app (arm64)
    needs: ci-filter
    if: ${{ needs.ci-filter.outputs.run_macos == 'true' }}
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        uses: ./.github/steps/install_dependencies
        with:
          job-platform: macos

      - name: Publish macOS app
        shell: bash
        run: |
          OUTPUT_DIR="$GITHUB_WORKSPACE/artifacts/macos/Emerald-macOS-arm64"
          mkdir -p "$OUTPUT_DIR"

          dotnet publish ./Emerald/Emerald.csproj \
            -c Release \
            -f net10.0-desktop \
            -r osx-arm64 \
            -p:SelfContained=true \
            -p:PackageFormat=app \
            -p:PublishTrimmed=false \
            -p:PublishSingleFile=false \
            -o "$OUTPUT_DIR"

      - name: Zip macOS .app (preserve app bundle metadata)
        shell: bash
        run: |
          OUTPUT_DIR="$GITHUB_WORKSPACE/artifacts/macos/Emerald-macOS-arm64"
          APP_PATH="$(find "$OUTPUT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in $OUTPUT_DIR"
            exit 1
          fi

          ZIP_PATH="$GITHUB_WORKSPACE/Emerald-macOS-arm64-app.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Emerald-macOS-arm64-app
          path: ${{ github.workspace }}/Emerald-macOS-arm64-app.zip
          retention-days: 7

  publish-linux:
    name: Linux x64 Package
    needs: ci-filter
    if: ${{ needs.ci-filter.outputs.run_linux == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        uses: ./.github/steps/install_dependencies
        with:
          job-platform: linux

      - name: Publish Linux app
        shell: bash
        run: |
          OUTPUT_DIR="$GITHUB_WORKSPACE/artifacts/linux/Emerald-linux-x64"
          mkdir -p "$OUTPUT_DIR"

          dotnet publish ./Emerald/Emerald.csproj \
            -c Release \
            -f net10.0-desktop \
            -r linux-x64 \
            -p:SelfContained=true \
            -p:PublishTrimmed=false \
            -p:PublishSingleFile=false \
            -o "$OUTPUT_DIR"

      - name: Archive Linux package
        shell: bash
        run: |
          ARCHIVE_PATH="$GITHUB_WORKSPACE/Emerald-linux-x64.tar.gz"
          tar -czf "$ARCHIVE_PATH" -C "$GITHUB_WORKSPACE/artifacts/linux" "Emerald-linux-x64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Emerald-linux-x64
          path: ${{ github.workspace }}/Emerald-linux-x64.tar.gz
          retention-days: 7
